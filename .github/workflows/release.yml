name: Build & Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Production Build
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Analyze Binary & Prepare Artifacts
        id: analysis
        shell: bash
        run: |
          mkdir -p staging
          BIN_PATH="target/x86_64-pc-windows-msvc/release/bad_apple.exe"
          TARGET_BIN="staging/bad_apple_$(git rev-parse --short HEAD).exe"
          cp "$BIN_PATH" "$TARGET_BIN"
          echo "DUMPBIN_OUTPUT<<EOF" >> $GITHUB_OUTPUT
          dumpbin /dependents "$BIN_PATH" | grep ".dll" | sed 's/^[[:space:]]*//' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT          
          echo "target_bin=$TARGET_BIN" >> $GITHUB_OUTPUT

      - name: Generate Randomized Metadata
        id: meta
        shell: bash
        run: |
          TIMESTAMP=$(date +'%Y%m%d%H%M')
          RANDOM_ID=$(head /dev/urandom | tr -dc a-z0-9 | head -c 6)
          TAG_NAME="v${TIMESTAMP}-${RANDOM_ID}"
          TITLES=("Infection_Success_${RANDOM_ID}" "Shadow_Apple_$(date +%s)" "Neural_Glitched_Artifact" "BadApple_Binary_Stream")
          SELECTED_TITLE=${TITLES[$(( RANDOM % ${#TITLES[@]} ))]}
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "release_title=$SELECTED_TITLE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_title }}
          body: |
            ### Technical Analysis (Static Linkage Check)
            The following runtime dependencies were identified in the binary:
            ```text
            ${{ steps.analysis.outputs.DUMPBIN_OUTPUT }}
            ```
            *Verification: If VCRUNTIME140.dll is absent, static linking is successful.*
          files: staging/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
