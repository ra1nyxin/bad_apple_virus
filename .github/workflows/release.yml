name: Build & Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Set up MSVC Dev Prompt
        uses: ilamont/setup-vcvars@v1

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Production Build
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Analyze Binary & Prepare Artifacts
        id: analysis
        shell: pwsh
        run: |
          $binPath = "target/x86_64-pc-windows-msvc/release/bad_apple.exe"
          $shortHash = $(git rev-parse --short HEAD)
          $targetBin = "staging/bad_apple_$shortHash.exe"
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item $binPath $targetBin
          $dumpOutput = dumpbin /dependents $binPath | Select-String ".dll" | ForEach-Object { $_.ToString().Trim() }
          $outputString = $dumpOutput -join "`n"
          "DUMPBIN_OUTPUT<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $outputString | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "target_bin=$targetBin" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Generate Randomized Metadata
        id: meta
        shell: bash
        run: |
          TIMESTAMP=$(date +'%Y%m%d%H%M')
          RANDOM_ID=$(head /dev/urandom | tr -dc a-z0-9 | head -c 6)
          echo "tag_name=v${TIMESTAMP}-${RANDOM_ID}" >> $GITHUB_OUTPUT
          echo "release_title=Infection_Success_${RANDOM_ID}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_title }}
          body: |
            ### Technical Analysis (Static Linkage Check)
            The following runtime dependencies were identified in the binary:
            ```text
            ${{ steps.analysis.outputs.DUMPBIN_OUTPUT }}
            ```
            *Verification: If VCRUNTIME140.dll is absent, static linking is successful.*
          files: staging/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
